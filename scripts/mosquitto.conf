per_listener_settings true

listener 1883
protocol mqtt
allow_anonymous true

listener 1884
protocol mqtt
allow_anonymous false
password_file /mosquitto/config/mosquitto.passwd

listener 8080
protocol websockets
allow_anonymous true

listener 8883
protocol mqtt
allow_anonymous true
cafile /mosquitto/certs/mosquitto.crt
certfile /mosquitto/certs/mosquitto.crt
keyfile /mosquitto/certs/mosquitto.key

persistence false
log_type all
log_dest stderr
